name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip rsync
      - name: Run release checks
        run: bash scripts/pre-release-check.sh
      - name: Upload release asset artifacts
        uses: actions/upload-artifact@v7
        with:
          name: moviepilot-release-assets-${{ github.sha }}
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
            dist/MANIFEST.json
            dist/skills/*.zip
            dist/skills/SHA256SUMS.txt
            dist/skills/MANIFEST.json
          if-no-files-found: error
          retention-days: 14
